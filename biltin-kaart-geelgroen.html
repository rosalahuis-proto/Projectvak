<!DOCTYPE html>
<html lang="nl" style="background:transparent;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --kaart-breedte: 420px;
    --header-kleur-links: #aaff00;
    --header-kleur-rechts: #66dd00;
    --header-tekstkleur: #ffffff;
    --kaart-achtergrond: #0d1b3e;
    --rand-kleur: rgba(255,255,255,0.15);
    --tekst-kleur: #e8edf8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; display: flex; justify-content: center; padding: 16px; font-family: sans-serif; }
  .kaart { width: var(--kaart-breedte); border-radius: 16px; overflow: hidden; border: 1.5px solid var(--rand-kleur); }
  .kaart-header { background: linear-gradient(135deg, var(--header-kleur-links), var(--header-kleur-rechts)); padding: 14px 20px; border-radius: 10px 10px 0 0; min-height: 52px; border-top: 3px solid #fff; border-left: 3px solid #fff; border-right: 3px solid #fff; }
  .kaart-body { background: var(--kaart-achtergrond); padding: 20px; height: 400px; color: var(--tekst-kleur); font-size: 14px; line-height: 1.7; border-left: 3px solid #fff; border-right: 3px solid #fff; border-bottom: 3px solid #fff; border-radius: 0 0 14px 14px; }
</style>
</head>
<body style="background:transparent;">
  <div class="kaart">
    <div class="kaart-header"></div>
    <div class="kaart-body"></div>
  </div>
  <script>
    const p = new URLSearchParams(window.location.search);
    const h = p.get('hoogte');
    if (h) document.querySelector('.kaart-body').style.height = h + 'px';
    const b = p.get('breedte');
    if (b) document.querySelector('.kaart').style.width = b + 'px';
  </script>
</body>
</html>
