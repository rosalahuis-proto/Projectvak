<!DOCTYPE html>
<html lang="nl" style="background:transparent;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root { --kaart-breedte: 420px; --header-links: #149d48; --header-rechts: #00ccaa; --achtergrond: #0d1b3e; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; display: flex; justify-content: center; padding: 16px; font-family: sans-serif; }
  .kaart { width: var(--kaart-breedte); border-radius: 16px; overflow: hidden; }
  .kaart-header { background: linear-gradient(135deg, var(--header-links), var(--header-rechts)); padding: 14px 20px; border-radius: 10px 10px 0 0; min-height: 52px; }
  .kaart-body { background: var(--achtergrond); padding: 20px; height: 400px; border-left: 3px solid #fff; border-right: 3px solid #fff; border-bottom: 3px solid #fff; border-radius: 0 0 14px 14px; }
</style>
</head>
<body style="background:transparent;">
  <div class="kaart">
    <div class="kaart-header"></div>
    <div class="kaart-body"></div>
  </div>
  <script>
    var p = new URLSearchParams(window.location.search);
    var h = p.get('hoogte'); if (h) document.querySelector('.kaart-body').style.height = h + 'px';
    var b = p.get('breedte'); if (b) document.querySelector('.kaart').style.width = b + 'px';
  </script>
</body>
</html>
